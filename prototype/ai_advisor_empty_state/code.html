<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cursus AI Advisor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4F46E5",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Inter", "Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="w-full bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-10">
<div class="max-w-[1280px] mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="bg-primary/10 p-2 rounded-lg flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-2xl">auto_awesome</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-lg font-bold tracking-tight font-display">AI Advisor</h1>
</div>
<div class="flex items-center gap-3">
<button class="hidden sm:flex items-center gap-2 px-4 py-2 text-sm font-semibold text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors">
<span class="material-symbols-outlined text-lg">delete</span>
                    Clear Chat
                </button>
<button class="flex items-center justify-center w-10 h-10 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 rounded-xl sm:hidden">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center p-4 sm:p-6 lg:p-8">
<!-- Chat Container -->
<div class="w-full max-w-[720px] bg-white dark:bg-slate-900 rounded-2xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-200 dark:border-slate-800 flex flex-col overflow-hidden h-[80vh]">
<!-- Chat Area (Empty State) -->
<div class="flex-1 bg-slate-50/50 dark:bg-slate-950/20 p-8 flex flex-col items-center justify-center text-center overflow-y-auto">
<div class="flex flex-col items-center max-w-md">
<div class="w-20 h-20 bg-primary/10 text-primary rounded-3xl flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-5xl">colors_spark</span>
</div>
<h2 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-3 font-display">
                        Ask me anything about your academic journey
                    </h2>
<p class="text-slate-500 dark:text-slate-400 text-base leading-relaxed">
                        I'm here to help you plan your courses, track your graduation progress, and offer tips for academic success.
                    </p>
</div>
</div>
<!-- Footer Section (Suggestions & Input) -->
<div class="border-t border-slate-200 dark:border-slate-800 p-4 sm:p-6 space-y-4 bg-white dark:bg-slate-900">
<!-- Suggestion Chips -->
<div class="flex flex-wrap gap-2 justify-center">
<button class="px-4 py-2 bg-slate-100 dark:bg-slate-800 hover:bg-primary/10 hover:text-primary dark:hover:bg-primary/20 text-slate-600 dark:text-slate-400 text-sm font-medium rounded-full border border-slate-200 dark:border-slate-700 transition-all">
                        What should I take next semester?
                    </button>
<button class="px-4 py-2 bg-slate-100 dark:bg-slate-800 hover:bg-primary/10 hover:text-primary dark:hover:bg-primary/20 text-slate-600 dark:text-slate-400 text-sm font-medium rounded-full border border-slate-200 dark:border-slate-700 transition-all">
                        Am I on track to graduate?
                    </button>
<button class="px-4 py-2 bg-slate-100 dark:bg-slate-800 hover:bg-primary/10 hover:text-primary dark:hover:bg-primary/20 text-slate-600 dark:text-slate-400 text-sm font-medium rounded-full border border-slate-200 dark:border-slate-700 transition-all">
                        How can I improve my GPA?
                    </button>
</div>
<!-- Input Area -->
<div class="relative flex items-center gap-3 bg-slate-50 dark:bg-slate-800 p-1.5 rounded-2xl border border-slate-200 dark:border-slate-700">
<button class="p-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined">attach_file</span>
</button>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-slate-900 dark:text-slate-100 placeholder-slate-400 text-base py-2" placeholder="Ask a question..." type="text"/>
<button class="bg-primary text-white p-2.5 rounded-xl flex items-center justify-center hover:bg-primary/90 transition-colors shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-xl">send</span>
</button>
</div>
</div>
</div>
<!-- Extra Info / Footer -->
<div class="mt-8 text-center">
<p class="text-slate-400 dark:text-slate-500 text-xs">
                Cursus AI Advisor can make mistakes. Verify important academic requirements with your Registrar.
            </p>
</div>
</main>
<script src="../nav.js"></script></body></html>
