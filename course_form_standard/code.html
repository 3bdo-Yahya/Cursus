<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cursus Admin - Add/Edit Course</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 w-full bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 shadow-sm">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between items-center h-16">
<div class="flex items-center gap-3">
<div class="bg-primary p-1.5 rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined">school</span>
</div>
<div>
<h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Cursus Admin</h1>
</div>
</div>
<div class="flex items-center gap-6">
<a class="flex items-center gap-1.5 text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                        Back to Courses
                    </a>
<div class="h-6 w-px bg-slate-200 dark:bg-slate-700"></div>
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[20px]">account_circle</span>
</div>
</div>
</div>
</div>
</div>
</header>
<main class="py-10 px-4 sm:px-6 lg:px-8">
<!-- Form Header Area -->
<div class="max-w-[600px] mx-auto mb-8">
<h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">Add New Course</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Create a new academic offering by providing the necessary details below.</p>
</div>
<!-- Main Form Card -->
<div class="max-w-[600px] mx-auto bg-white dark:bg-slate-900 rounded-xl shadow-xl border border-slate-200 dark:border-slate-800 overflow-hidden">
<form action="#" class="p-8 space-y-6" method="POST">
<!-- Department Selection -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="department">Department</label>
<select class="w-full h-12 rounded-lg border-slate-300 dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100" id="department" name="department">
<option disabled="" selected="" value="">Select Department</option>
<option value="cs">Computer Science &amp; Engineering</option>
<option value="ee">Electrical Engineering</option>
<option value="math">Mathematics</option>
<option value="phy">Physics</option>
<option value="hum">Humanities</option>
</select>
</div>
<!-- Course Code & Credit Hours Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="course_code">Course Code</label>
<input class="w-full h-12 rounded-lg border-slate-300 dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100" id="course_code" name="course_code" placeholder="e.g. CS101" type="text"/>
</div>
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="credit_hours">Credit Hours</label>
<input class="w-full h-12 rounded-lg border-slate-300 dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100" id="credit_hours" max="6" min="1" name="credit_hours" placeholder="e.g. 3" type="number"/>
</div>
</div>
<!-- Course Name -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="course_name">Course Name</label>
<input class="w-full h-12 rounded-lg border-slate-300 dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100" id="course_name" name="course_name" placeholder="e.g. Introduction to Algorithms" type="text"/>
</div>
<!-- Course Type & Semester Availability Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="course_type">Course Type</label>
<select class="w-full h-12 rounded-lg border-slate-300 dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100" id="course_type" name="course_type">
<option disabled="" selected="" value="">Select Type</option>
<option value="core">Core Requirement</option>
<option value="elective">Elective</option>
<option value="lab">Laboratory</option>
<option value="seminar">Seminar</option>
</select>
</div>
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="semester">Semester Availability</label>
<select class="w-full h-12 rounded-lg border-slate-300 dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100" id="semester" name="semester">
<option disabled="" selected="" value="">Select Semester</option>
<option value="fall">Fall Only</option>
<option value="spring">Spring Only</option>
<option value="both">Both Semesters</option>
<option value="summer">Summer Term</option>
</select>
</div>
</div>
<!-- Passing Grade Selection -->
<div class="space-y-2 pb-4">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="passing_grade">Minimum Passing Grade</label>
<select class="w-full h-12 rounded-lg border-slate-300 dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100" id="passing_grade" name="passing_grade">
<option disabled="" selected="" value="">Select Minimum Grade</option>
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>
<option value="P">Pass/Fail</option>
</select>
</div>
<!-- Form Footer Actions -->
<div class="flex items-center justify-end gap-4 pt-6 border-t border-slate-100 dark:border-slate-800">
<button class="px-6 py-2.5 rounded-lg text-sm font-semibold text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" type="button">
                        Cancel
                    </button>
<button class="px-8 py-2.5 rounded-lg text-sm font-bold text-white bg-primary hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all flex items-center gap-2" type="submit">
<span class="material-symbols-outlined text-[18px]">save</span>
                        Save Course
                    </button>
</div>
</form>
</div>
<!-- Footer Visual Hint -->
<div class="max-w-[600px] mx-auto mt-12 flex items-center justify-center gap-8 opacity-40 grayscale pointer-events-none">
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-4xl mb-2">auto_stories</span>
<span class="text-[10px] uppercase tracking-widest font-bold">Curriculum</span>
</div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-4xl mb-2">analytics</span>
<span class="text-[10px] uppercase tracking-widest font-bold">Insights</span>
</div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-4xl mb-2">verified_user</span>
<span class="text-[10px] uppercase tracking-widest font-bold">Accredited</span>
</div>
</div>
</main>
<script src="../nav.js"></script></body></html>
