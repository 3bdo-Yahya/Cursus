<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cursus — Login</title>
  <link rel="stylesheet" href="../../lib/bootstrap/dist/css/bootstrap.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <link rel="stylesheet" href="../../css/site.css"/>
  <link rel="stylesheet" href="../../css/pages/auth/login.css"/>
</head>
<body>

<div class="login-split">

  <!-- ─── Left panel ───────────────────────────────────────── -->
  <div class="login-panel-left d-none d-lg-flex">
    <svg id="graph-svg" class="login-graph-svg" viewBox="0 0 700 800"
         xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <g id="connectors" opacity="0.15" stroke="white" stroke-width="1" fill="none">
        <line id="c1"  x1="140" y1="180" x2="300" y2="120"/>
        <line id="c2"  x1="300" y1="120" x2="480" y2="220"/>
        <line id="c3"  x1="300" y1="120" x2="240" y2="380"/>
        <line id="c4"  x1="480" y1="220" x2="560" y2="460"/>
        <line id="c5"  x1="240" y1="380" x2="400" y2="560"/>
        <line id="c6"  x1="560" y1="460" x2="400" y2="560"/>
        <line id="c7"  x1="140" y1="180" x2="240" y2="380"/>
        <line id="c8"  x1="400" y1="560" x2="300" y2="680"/>
        <line id="c9"  x1="80"  y1="500" x2="240" y2="380"/>
        <line id="c10" x1="620" y1="150" x2="480" y2="220"/>
      </g>
      <g class="node-1" style="transform-origin:140px 180px">
        <circle cx="140" cy="180" r="10" fill="white" opacity="0.08"/>
        <circle cx="140" cy="180" r="4"  fill="white" opacity="0.85"/>
      </g>
      <g class="node-2" style="transform-origin:300px 120px">
        <circle cx="300" cy="120" r="14" fill="white" opacity="0.1"/>
        <circle cx="300" cy="120" r="6"  fill="white" opacity="1" class="node-pulse"/>
      </g>
      <g class="node-3" style="transform-origin:480px 220px">
        <circle cx="480" cy="220" r="10" fill="white" opacity="0.08"/>
        <circle cx="480" cy="220" r="4"  fill="white" opacity="0.85"/>
      </g>
      <g class="node-4" style="transform-origin:240px 380px">
        <circle cx="240" cy="380" r="12" fill="white" opacity="0.09"/>
        <circle cx="240" cy="380" r="5"  fill="white" opacity="0.9"/>
      </g>
      <g class="node-5" style="transform-origin:560px 460px">
        <circle cx="560" cy="460" r="10" fill="white" opacity="0.08"/>
        <circle cx="560" cy="460" r="4"  fill="white" opacity="0.8"/>
      </g>
      <g class="node-6" style="transform-origin:400px 560px">
        <circle cx="400" cy="560" r="13" fill="white" opacity="0.1"/>
        <circle cx="400" cy="560" r="5"  fill="white" opacity="0.9"/>
      </g>
      <g class="node-7" style="transform-origin:300px 680px">
        <circle cx="300" cy="680" r="10" fill="white" opacity="0.08"/>
        <circle cx="300" cy="680" r="4"  fill="white" opacity="0.75"/>
      </g>
      <g style="transform-origin:80px 500px; animation: drift3 14s ease-in-out infinite;">
        <circle cx="80"  cy="500" r="8" fill="white" opacity="0.07"/>
        <circle cx="80"  cy="500" r="3" fill="white" opacity="0.6"/>
      </g>
      <g style="transform-origin:620px 150px; animation: drift5 10s ease-in-out infinite;">
        <circle cx="620" cy="150" r="8" fill="white" opacity="0.07"/>
        <circle cx="620" cy="150" r="3" fill="white" opacity="0.65"/>
      </g>
    </svg>

    <div class="login-brand-content">
      <div class="anim-fade-in">
        <h1 class="login-brand-title">Cursus</h1>
      </div>
      <p class="login-brand-sub anim-fade-up">
        Your AI-Powered Academic Advisor<span class="cursor"></span>
      </p>
      <div class="login-pills anim-fade-up-2">
        <span class="login-pill">Graduation Planner</span>
        <span class="login-pill">Drop/Fail Analyzer</span>
        <span class="login-pill">AI Chatbot</span>
      </div>
    </div>

    <div class="login-bottom-tag anim-fade-in">
      <p>DEPI Graduation Project · 2026</p>
    </div>
  </div>

  <!-- ─── Right panel ───────────────────────────────────────── -->
  <div class="login-panel-right">

    <!-- Mobile logo -->
    <div class="login-mobile-logo d-lg-none anim-fade-up">
      <h1>Cursus</h1>
      <p>Academic Advisor</p>
    </div>

    <div class="login-form-wrap">
      <!-- Heading -->
      <div class="login-heading anim-fade-up-1">
        <h2>Welcome back</h2>
        <p>Sign in to continue to your dashboard</p>
      </div>

      <!-- Form -->
      <form id="login-form" action="#" novalidate>
        <!-- Email -->
        <div class="mb-4 anim-fade-up-2">
          <label for="email" class="login-label">Email address</label>
          <input id="email" name="email" type="email"
                 class="login-input"
                 placeholder="you@university.edu"
                 autocomplete="email"/>
          <span class="login-field-error" id="email-error"></span>
        </div>

        <!-- Password -->
        <div class="mb-4 anim-fade-up-3">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <label for="password" class="login-label mb-0">Password</label>
          </div>
          <div class="position-relative">
            <input id="password" name="password" type="password"
                   class="login-input"
                   placeholder="Enter your password"
                   autocomplete="current-password"
                   style="padding-right: 3rem;"/>
            <button type="button" id="toggle-pw" class="eye-btn" aria-label="Toggle password visibility">
              <span class="material-symbols-outlined">visibility</span>
            </button>
          </div>
          <a href="forgot-password.html" class="login-forgot">Forgot password?</a>
          <span class="login-field-error" id="password-error"></span>
        </div>

        <!-- Remember me -->
        <div class="mb-4 anim-fade-up-4">
          <div class="form-check login-check">
            <input class="form-check-input" type="checkbox" id="rememberMe" name="rememberMe"/>
            <label class="form-check-label" for="rememberMe">Keep me signed in</label>
          </div>
        </div>

        <!-- Submit -->
        <div class="anim-fade-up-5">
          <button type="submit" id="signin-btn" class="login-btn-primary w-100">
            <span id="btn-label">Sign In</span>
          </button>
        </div>
      </form>

      <!-- Footer note -->
      <div class="login-footer-note anim-fade-up-5">
        <p>Access is provisioned by your university administrator</p>
      </div>
    </div>
  </div>
</div>

<script src="../../lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/site.js"></script>
<script src="../../js/pages/auth/login.js"></script>
</body>
</html>
